<footer class="w-full bg-surface/90 backdrop-blur-2xl border-t border-surface-variant mt-12">

  <div class="max-w-6xl mx-auto px-6 py-10 grid grid-cols-1 md:grid-cols-3 gap-8">

    <!-- Logo / Info -->
    <div>
      <h2 class="text-xl font-bold text-primary font-headline">
        BookHub
      </h2>
      <p class="text-on-surface-variant mt-2 text-sm">
        Gestion de bibliothèque moderne, simple et élégante.
      </p>
    </div>

    <!-- Links -->
    <div>
      <h3 class="font-semibold text-on-surface mb-3">Navigation</h3>
      <ul class="space-y-2 text-sm text-on-surface-variant">
        <li><a href="#" class="hover:text-primary transition">Accueil</a></li>
        <li><a href="#" class="hover:text-primary transition">Recherche</a></li>
      </ul>
    </div>

    <!-- Contact -->
    <div>
      <h3 class="font-semibold text-on-surface mb-3">Contact</h3>
      <ul class="space-y-2 text-sm text-on-surface-variant">
        <li class="flex align-center">
          <p>Email: </p>
          <a [href]="'mailto:' + emailRef.innerText.trim()" class="flex gap-2">
            <p #emailRef>contact&#64;livingarchive.com</p>
            <svg xmlns="http://www.w3.org/2000/svg" height="1rem" viewBox="0 -960 960 960" width="24px" fill="#1c398e"><path d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160Zm320-280L160-640v400h640v-400L480-440Zm0-80 320-200H160l320 200ZM160-640v-80 480-400Z"/></svg>
          </a>
        </li>
        <li class="flex align-center">
          <p>Téléphone: </p>
          <a [href]="'tel:' + telRef.innerText.trim()" class="flex gap-2">
            <p #telRef>+33 6 00 00 00 00 </p>
            <svg xmlns="http://www.w3.org/2000/svg" height="1rem" viewBox="0 -960 960 960" width="24px" fill="#1c398e"><path d="M798-120q-125 0-247-54.5T329-329Q229-429 174.5-551T120-798q0-18 12-30t30-12h162q14 0 25 9.5t13 22.5l26 140q2 16-1 27t-11 19l-97 98q20 37 47.5 71.5T387-386q31 31 65 57.5t72 48.5l94-94q9-9 23.5-13.5T670-390l138 28q14 4 23 14.5t9 23.5v162q0 18-12 30t-30 12ZM241-600l66-66-17-94h-89q5 41 14 81t26 79Zm358 358q39 17 79.5 27t81.5 13v-88l-94-19-67 67ZM241-600Zm358 358Z"/></svg>
          </a>
          </li>
      </ul>
    </div>

  </div>

  <!-- Bottom bar -->
  <div class="border-t border-surface-variant py-4 text-center text-xs text-on-surface-variant">
    © 2026 BookHub. Tous droits réservés.
  </div>

</footer>
