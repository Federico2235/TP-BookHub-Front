<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl shadow-sm bg-surface-container-low/10">
  <section class="flex justify-between items-center px-8 py-4 max-w-full mx-auto">
    <div class="flex items-top w-full gap-4">
      <!--------------------- Logo --------------------->
      <a routerLink="" class="text-3xl font-bold tracking-tight text-blue-900 cursor-pointer">BookHub</a>
      <!-------------- navigation principale ---------->
      <nav class="hidden md:flex flex-1 justify-between items-center">
        <ul class="flex gap-6">
          <li>
            <a routerLink="" [routerLinkActiveOptions]="{exact:true}" routerLinkActive="after:w-full"
               class="relative inline-block leading-none text-blue-900 font-semibold py-3
                after:content-[''] after:absolute after:left-0 after:bottom-0 after:h-[2px] after:w-0 after:bg-primary after:origin-left after:transition-all after:duration-300 hover:after:w-full"
            >
              Catalogue
            </a>
          </li>
          @if (loggedUser() && (isLibrarian())){
            <li>
              <a routerLink="/librarian/board" [routerLinkActiveOptions]="{exact:true}" routerLinkActive="after:w-full"
                 class="relative inline-block leading-none text-blue-900 font-semibold py-3
                  after:content-[''] after:absolute after:left-0 after:bottom-0 after:h-[2px] after:w-0 after:bg-primary after:origin-left after:transition-all after:duration-300 hover:after:w-full">
                Dashboard
              </a>
            </li>
          }
          @if (loggedUser() && isAdmin()){
            <li>
              <a routerLink="/admin/board" [routerLinkActiveOptions]="{exact:true}" routerLinkActive="after:w-full"
                 class="relative inline-block leading-none text-blue-900 font-semibold py-3
                  after:content-[''] after:absolute after:left-0 after:bottom-0 after:h-[2px] after:w-0 after:bg-primary after:origin-left after:transition-all after:duration-300 hover:after:w-full">
                Dashboard
              </a>
            </li>
          }
        </ul>
        <div class="flex items-center gap-4">
          @if (loggedUser(); as user){
            <a [routerLink]="['/profile', user.userId]" [routerLinkActiveOptions]="{exact:true}" routerLinkActive="border-b-ease-in border-b-blue-900/30"
              class="relative group flex items-center gap-3 px-4 py-1 bg-surface-container-highest box-border rounded-full hover:bg-primary cursor-pointer
              border-b border-b-3 border-b-blue-900/0 transition-[border-color] duration-300 ease-in delay-200"
            >

              <span class="material-symbols-outlined text-primary group-hover:cursor-pointer group-hover:text-slate-100 transition-colors duration-300 ease-out" data-icon="account_circle">account_circle</span>
              <span class="text-on-surface font-medium group-hover:text-slate-100">{{user.firstName}} {{user.lastName}}</span>
            </a>
            <a (click)="logout()" class=" group flex items-center gap-3 px-4 py-1 bg-surface-container-highest rounded-full hover:cursor-pointer hover:text-slate-100 hover:bg-primary
              border-b border-b-3 border-b-blue-900/0"
            >
              <span class="text-on-surface font-medium group-hover:text-slate-100 transition-colors duration-300 ease-out">Se déconnecter</span>
            </a>
          }
          @if (!loggedUser()){
            <a routerLink="/login" [routerLink]="['/signup']" [routerLinkActiveOptions]="{exact:true}" routerLinkActive="border-b-ease-in border-b-blue-900/30" class="px-6 py-2 rounded-full text-primary font-semibold bg-slate-100 hover:bg-primary hover:text-slate-100 transition-colors duration-300 ease-out cursor-pointer
              border-b border-b-3 border-b-blue-900/0">
              Créer un compte
            </a>
            <a routerLink="/login" [routerLink]="['/login']" [routerLinkActiveOptions]="{exact:true}" routerLinkActive="border-b-ease-in border-b-blue-900/30" class="px-6 py-2 rounded-full text-primary font-semibold bg-slate-100 hover:bg-primary hover:text-slate-100 transition-colors duration-300 ease-out cursor-pointer
              border-b border-b-3 border-b-blue-900/0">
              Se connecter
            </a>
          }
        </div>
      </nav>
    </div>
  </section>
</header>
