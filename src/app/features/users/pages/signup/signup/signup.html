<!-- Visual Column (Asymmetric / Editorial) -->
<div class="flex-grow flex pt-16 lg:pt-0">
  <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-primary-container">
    <div class="absolute inset-0 bg-gradient-to-br from-primary/40 to-primary-container/80 z-10"></div>
    <img alt="A sunlit, expansive library hall with tall wooden shelves and warm ambient lighting" class="absolute inset-0 object-cover w-full h-full" data-alt="A modern architectural library with vast wooden bookshelves, soft warm sunlight streaming through large windows, and a peaceful communal atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCy4eOa6i0pj_6T-fdODpbHPbR24sSD6cUQrIOjB1NvOU00BvNPloojfdb0lXb33DYw0OlND4xE4uITz4hSjGYT9oMbc2JXlti_2EMYO6LOt2WIkwFbfOvqCLNXVJJd53r9jufM2Jb7wtKPrA6ksfJmoi1_KK4bh7f6anBLxttmjmUhrfbVsZKG81OjexIiPn6O4iNkZOEpk-oZGXTHEA5Uf-8t6zR6P4gSnMRqGXSKsiFc65Ar90JhnysctujfcbnvgxL9g_3l4VB9"/>
    <div class="relative z-20 flex flex-col justify-end p-16 text-white max-w-xl">
      <h1 class="text-5xl font-extrabold tracking-tight mb-6 leading-tight">Le plaisir de lire</h1>
      <p class="text-xl text-primary-fixed leading-relaxed opacity-90">
        Rejoignez une communauté associative de lecteurs passionnés ! :)
      </p>
    </div>
  </div>
  <!-- Form Column -->
  <div class="w-full lg:w-1/2 flex items-center justify-center p-8 lg:p-16 bg-surface">
    <div class="w-full max-w-md">
      <div class="mb-10">
        <h2 class="text-3xl font-bold text-on-surface mb-2 tracking-tight">Créez votre compte</h2>
      </div>
      <form class="space-y-6">
        <!-- First Name -->
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-on-surface-variant px-1" for="full_name">Prénom</label>
          <div class="relative group">
            <input [(ngModel)]="firstName" class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/20 rounded-xl px-4 py-4 text-on-surface focus:ring-primary focus:ring-2 transition-all duration-300 placeholder:text-outline" id="full_name" name="full_name" placeholder="Eleanor" required="true" type="text"/>
          </div>
        </div>
        <p>{{firstName}}</p>
        <!-- Last Name -->
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-on-surface-variant px-1" for="full_name">Nom</label>
          <div class="relative group">
            <input [(ngModel)]="lastName" class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/20 rounded-xl px-4 py-4 text-on-surface focus:ring-primary focus:ring-2 transition-all duration-300 placeholder:text-outline" id="full_name" name="full_name" placeholder="VANCE" required="true" type="text"/>
          </div>
        </div>
        <!-- Email Address -->
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-on-surface-variant px-1" for="email">Adresse email</label>
          <div class="relative">
            <input [(ngModel)]="email" class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/20 rounded-xl px-4 py-4 text-on-surface focus:ring-primary focus:ring-2 transition-all duration-300 placeholder:text-outline" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
          </div>
        </div>
        <!-- Password Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="space-y-2">
            <label class="block text-sm font-semibold text-on-surface-variant px-1" for="password">Mot de passe</label>
            <input [(ngModel)]="password" class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/20 rounded-xl px-4 py-4 text-on-surface focus:ring-primary focus:ring-2 transition-all duration-300 placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
          </div>
          <div class="space-y-2">
            <label class="block text-sm font-semibold text-on-surface-variant px-1" for="confirm_password">Confirmation du mot de passe</label>
            <input [(ngModel)]="confirmedPassword" class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/20 rounded-xl px-4 py-4 text-on-surface focus:ring-primary focus:ring-2 transition-all duration-300 placeholder:text-outline" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
          </div>
        </div>

        <!-- Primary CTA -->
        <button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary py-4 rounded-xl font-bold text-lg shadow-lg shadow-primary/10 hover:opacity-95 transition-all active:scale-[0.98] mt-4" type="submit">
          Enregistrer
        </button>
      </form>
      <!-- Secondary Options -->
      <div class="mt-8 text-center">
        <p class="text-on-surface-variant">
          Vous avez déjà un compte ?
          <a class="text-primary font-bold hover:underline ml-1" href="#">Connectez-vous (redirection)</a>
        </p>
      </div>
    </div>
  </div>
</div>
